name: EAS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile to use'
        required: false
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUILD_PROFILE: ${{ github.event.inputs.profile || 'preview' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup Expo and EAS, then build
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          command: build --non-interactive --profile ${{ env.BUILD_PROFILE }} --platform all
